<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexa</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:*" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        font-family: Inter, Segoe UI, system-ui, sans-serif;
      }
      .bubble {
        width: 72px;
        height: 72px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(145deg, #f7d58a, #f2b84b);
        color: #080b12;
        font-size: 30px;
        cursor: pointer;
        -webkit-app-region: drag;
        box-shadow: 0 18px 44px rgba(242, 184, 75, 0.28);
      }
      .panel {
        width: 320px;
        height: 420px;
        overflow: hidden;
        border: 1px solid rgba(247, 213, 138, 0.22);
        border-radius: 8px;
        background: rgba(8, 11, 18, 0.9);
        color: #f8fafc;
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.42);
      }
      .title {
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        background: linear-gradient(135deg, #111827, #1f2937);
        color: #f7d58a;
        -webkit-app-region: drag;
      }
      button,
      input {
        -webkit-app-region: no-drag;
        font: inherit;
      }
      .content {
        padding: 12px;
      }
      input {
        width: 100%;
        height: 38px;
        border: 1px solid rgba(247, 213, 138, 0.24);
        border-radius: 6px;
        padding: 0 10px;
        background: rgba(255, 255, 255, 0.06);
        color: #f8fafc;
      }
      .send {
        margin-top: 8px;
        width: 100%;
        height: 36px;
        border: 0;
        border-radius: 6px;
        background: #f2b84b;
        color: #080b12;
      }
      .status {
        margin-top: 12px;
        min-height: 110px;
        border: 1px solid rgba(247, 213, 138, 0.18);
        border-radius: 6px;
        padding: 10px;
        color: #dbe2ef;
        font-size: 13px;
        white-space: pre-wrap;
      }
      .min {
        border: 0;
        background: rgba(247, 213, 138, 0.14);
        color: #f7d58a;
        border-radius: 4px;
        width: 28px;
        height: 28px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const root = document.getElementById("root");
      let expanded = false;

      function render() {
        root.innerHTML = expanded
          ? `<div class="panel"><div class="title"><strong>Nexa</strong><button class="min" id="min">-</button></div><div class="content"><input id="command" placeholder="Type command..." /><button class="send" id="send">Run</button><div class="status" id="status">Nexa Active</div></div></div>`
          : `<div class="bubble" id="bubble">N</div>`;
        window.nexa.resize(expanded);
        if (expanded) {
          document.getElementById("min").onclick = () => {
            expanded = false;
            render();
          };
          document.getElementById("send").onclick = async () => {
            const input = document.getElementById("command");
            const status = document.getElementById("status");
            status.textContent = "Running...";
            try {
              const result = await window.nexa.command(input.value);
              status.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
              status.textContent = String(error);
            }
          };
        } else {
          document.getElementById("bubble").onclick = () => {
            expanded = true;
            render();
          };
        }
      }
      render();
    </script>
  </body>
</html>
