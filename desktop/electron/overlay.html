<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexa</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:*" />
    <style>
      :root {
        color-scheme: dark;
        --bg: rgba(7, 10, 17, 0.78);
        --panel: rgba(15, 23, 42, 0.82);
        --panel-strong: rgba(8, 11, 18, 0.94);
        --line: rgba(247, 213, 138, 0.18);
        --line-strong: rgba(247, 213, 138, 0.34);
        --gold: #f2b84b;
        --gold-soft: #f7d58a;
        --ink: #f8fafc;
        --muted: #94a3b8;
        --scale: 1;
      }

      body.large {
        --scale: 1.12;
      }

      body.contrast {
        --line: rgba(247, 213, 138, 0.42);
        --line-strong: rgba(247, 213, 138, 0.76);
        --panel: rgba(0, 0, 0, 0.92);
        --muted: #dbe2ef;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: Inter, Segoe UI, system-ui, sans-serif;
        user-select: none;
      }

      button,
      input,
      select,
      textarea {
        -webkit-app-region: no-drag;
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .drag {
        -webkit-app-region: drag;
      }

      .bubble {
        position: absolute;
        left: 10px;
        top: 10px;
        width: calc(76px * var(--scale));
        height: calc(76px * var(--scale));
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        background:
          radial-gradient(circle at 35% 28%, #fff2c4, transparent 30%),
          linear-gradient(145deg, #f7d58a, #f2b84b 58%, #bf7c16);
        color: #080b12;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0;
        box-shadow: 0 20px 52px rgba(242, 184, 75, 0.38), inset 0 0 0 1px rgba(255, 255, 255, 0.22);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .bubble:hover {
        transform: translateY(-1px) scale(1.03);
        box-shadow: 0 26px 68px rgba(242, 184, 75, 0.48), inset 0 0 0 1px rgba(255, 255, 255, 0.24);
      }

      .bubble.listening {
        animation: voicePulse 1.2s ease-in-out infinite;
        box-shadow: 0 0 0 8px rgba(34, 211, 238, 0.12), 0 24px 70px rgba(34, 211, 238, 0.32);
      }

      .center-orb.listening {
        animation: centerVoicePulse 1.2s ease-in-out infinite;
        box-shadow: 0 0 0 8px rgba(34, 211, 238, 0.12), 0 24px 70px rgba(34, 211, 238, 0.32);
      }

      @keyframes voicePulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }

      @keyframes centerVoicePulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); }
        50% { transform: translate(-50%, -50%) scale(1.06); }
      }

      .bubble-status {
        position: absolute;
        right: 13px;
        bottom: 13px;
        width: 14px;
        height: 14px;
        border: 2px solid #111827;
        border-radius: 999px;
        background: #34d399;
      }

      .radial-shell {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background:
          radial-gradient(circle at 50% 50%, rgba(242, 184, 75, 0.18), transparent 34%),
          radial-gradient(circle at 20% 12%, rgba(247, 213, 138, 0.15), transparent 26%);
        backdrop-filter: blur(10px);
      }

      .center-orb {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 3;
        display: grid;
        width: calc(138px * var(--scale));
        height: calc(138px * var(--scale));
        place-items: center;
        transform: translate(-50%, -50%);
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: rgba(8, 11, 18, 0.88);
        color: var(--gold-soft);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.38), inset 0 0 42px rgba(242, 184, 75, 0.14);
        text-align: center;
      }

      .center-orb strong {
        display: block;
        color: var(--gold);
        font-size: 24px;
      }

      .center-orb span {
        color: var(--muted);
        font-size: 11px;
      }

      .center-close {
        position: absolute;
        right: 5px;
        top: 5px;
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border: 1px solid rgba(247, 213, 138, 0.28);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.42);
        color: var(--gold-soft);
        font-weight: 800;
      }

      .radial-item {
        position: absolute;
        left: calc(50% + var(--x));
        top: calc(50% + var(--y));
        display: grid;
        width: calc(92px * var(--scale));
        height: calc(92px * var(--scale));
        place-items: center;
        transform: translate(-50%, -50%);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.78);
        color: var(--ink);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
        animation: orbitIn 240ms ease both;
        animation-delay: var(--delay, 0ms);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .radial-item:hover {
        transform: translate(-50%, -50%) scale(1.06);
        border-color: var(--line-strong);
        background: rgba(27, 36, 55, 0.92);
      }

      .radial-icon {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 12px;
        background: rgba(242, 184, 75, 0.18);
        color: var(--gold-soft);
        font-weight: 800;
        font-size: 18px;
      }

      .radial-label {
        max-width: 78px;
        overflow: hidden;
        color: #dbe2ef;
        font-size: 11px;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .radial-reason {
        max-width: 78px;
        overflow: hidden;
        color: var(--muted);
        font-size: 9px;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @keyframes orbitIn {
        from {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.72);
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      .panel {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 24px;
        background:
          radial-gradient(circle at 10% 0%, rgba(242, 184, 75, 0.16), transparent 28%),
          linear-gradient(135deg, rgba(8, 11, 18, 0.96), rgba(15, 23, 42, 0.92));
        color: var(--ink);
        backdrop-filter: blur(20px);
        box-shadow: 0 28px 78px rgba(0, 0, 0, 0.48);
      }

      .warning {
        margin-bottom: 10px;
        border: 1px solid rgba(248, 113, 113, 0.44);
        border-radius: 16px;
        background: rgba(127, 29, 29, 0.34);
        color: #fecaca;
        padding: 12px;
      }

      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .panel-head {
        display: flex;
        height: 58px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
        padding: 0 16px;
      }

      .panel-title {
        min-width: 0;
      }

      .panel-title strong {
        display: block;
        color: var(--gold-soft);
        font-size: 16px;
      }

      .panel-title span {
        color: var(--muted);
        font-size: 11px;
      }

      .head-actions {
        display: flex;
        gap: 8px;
      }

      .icon-button {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--gold-soft);
      }

      .panel-body {
        height: calc(100vh - 58px);
        overflow: auto;
        padding: 14px;
      }

      .grid {
        display: grid;
        gap: 10px;
      }

      .cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .card {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.055);
        padding: 12px;
      }

      .label {
        color: var(--muted);
        font-size: 11px;
      }

      .value {
        margin-top: 4px;
        overflow-wrap: anywhere;
        color: var(--ink);
        font-size: 17px;
        font-weight: 700;
      }

      .small {
        color: var(--muted);
        font-size: 12px;
      }

      .list {
        display: grid;
        gap: 8px;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        padding: 10px;
      }

      .pill {
        border: 1px solid rgba(242, 184, 75, 0.24);
        border-radius: 999px;
        padding: 5px 8px;
        color: var(--gold-soft);
        font-size: 11px;
      }

      .button {
        height: 34px;
        border: 0;
        border-radius: 12px;
        background: var(--gold);
        color: #080b12;
        font-weight: 700;
        padding: 0 12px;
      }

      .ghost {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--gold-soft);
      }

      .field,
      .select {
        width: 100%;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--ink);
        padding: 0 12px;
        outline: none;
      }

      .chat-log {
        display: grid;
        max-height: 350px;
        gap: 10px;
        overflow: auto;
        padding-right: 4px;
      }

      .message {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.055);
        padding: 10px;
        white-space: pre-wrap;
      }

      .message strong {
        color: var(--gold-soft);
      }

      .empty {
        display: grid;
        min-height: 160px;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 16px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 520px) {
        .cols-2,
        .cols-3 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const root = document.getElementById("root");
      const permanentModules = [
        { id: "chat", label: "Chat", icon: "💬", reason: "Always ready" },
        { id: "tasks", label: "Tasks", icon: "📋", reason: "Always visible" },
        { id: "battery", label: "Battery", icon: "🔋", reason: "Power health" },
        { id: "focus", label: "Focus", icon: "FM", reason: "Productivity" },
        { id: "study", label: "Study", icon: "ST", reason: "Exam coach" },
        { id: "timeline", label: "Timeline", icon: "TL", reason: "Memory" },
        { id: "guardian", label: "Guardian", icon: "PG", reason: "Recovery" }
      ];
      const state = {
        view: "bubble",
        panel: "status",
        taps: 0,
        dashboard: null,
        coding: null,
        weekly: null,
        batterySettings: null,
        powerSettings: null,
        powerHistory: null,
        focusStatus: null,
        studyDashboard: null,
        timelineDashboard: null,
        guardianDashboard: null,
        voiceStatus: null,
        chat: [{ who: "Nexa", text: "Nexa Active" }],
        loading: false,
        large: false,
        contrast: false,
        error: ""
      };

      function resize(mode) {
        window.nexa.resize(mode);
      }

      function setView(view, panel) {
        state.view = view;
        if (panel) state.panel = panel;
        render();
        resize(view === "bubble" ? "bubble" : view === "radial" ? "radial" : view === "chat" ? "chat" : "panel");
        if (view !== "bubble") refresh();
      }

      function fmt(value, suffix) {
        if (value === null || value === undefined || Number.isNaN(value)) return "N/A";
        return suffix ? `${value}${suffix}` : String(value);
      }

      function secs(value) {
        if (!value || value < 0 || value === 4294967295) return "Unknown";
        const hours = Math.floor(value / 3600);
        const minutes = Math.floor((value % 3600) / 60);
        return hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
      }

      function batteryHealth(percent) {
        if (percent === null || percent === undefined) return "Unknown";
        if (percent >= 50) return "Good";
        if (percent >= 20) return "Fair";
        return "Low";
      }

      function activeRadialModules() {
        const dashboard = state.dashboard || {};
        const system = dashboard.system || {};
        const context = system.context || {};
        const alert = dashboard.battery_alert || {};
        const power = dashboard.power_monitor || {};
        const focus = state.focusStatus || {};
        const automations = dashboard.automations || [];
        const activeTasks = (dashboard.tasks || []).filter((task) => ["created", "running", "pending_confirmation"].includes(task.status)).length;
        const activeAutomations = automations.filter((item) => item.enabled).length;
        const dynamic = [];
        if (context.vscode_open || context.cursor_open || context.git_active) {
          dynamic.push({
            id: "coding",
            label: context.git_active ? "Git Active" : context.cursor_open ? "Cursor" : "VS Code",
            icon: context.git_active ? "🌿" : context.cursor_open ? "⚡" : "💻",
            reason: context.git_active ? "Git operation" : "Coding app"
          });
        }
        if (context.chrome_open) {
          dynamic.push({ id: "browser", label: "Chrome", icon: "🌐", reason: "Browser open" });
        }
        if (context.spotify_open) {
          dynamic.push({ id: "media", label: "Spotify", icon: "🎵", reason: "Media open" });
        }
        if (context.downloads_active) {
          dynamic.push({ id: "files", label: "Downloads", icon: "⬇", reason: "Download active" });
        }
        if (alert.alert_active || ((power.battery_percent ?? alert.battery_percent ?? system.battery_percent) <= 20 && !(power.is_charging ?? alert.is_charging ?? system.battery_plugged))) {
          dynamic.push({ id: "battery", label: "Battery Low", icon: "🔋", reason: "Needs charge" });
        }
        if (context.system_attention) {
          dynamic.push({ id: "system", label: "Alert", icon: "🚨", reason: "High load" });
        }
        if (activeAutomations > 0) {
          dynamic.push({ id: "automation", label: "Automation", icon: "⚙", reason: `${activeAutomations} enabled` });
        }
        if (activeTasks > 0) {
          dynamic.push({ id: "tasks", label: "Active Tasks", icon: "TK", reason: `${activeTasks} active` });
        }
        if (focus.active) {
          dynamic.push({ id: "focus", label: `${Math.floor((focus.remaining_seconds || 0) / 60)}m Focus`, icon: "FM", reason: `${Math.round(focus.session_progress_percent || 0)}% done` });
        }
        const merged = [...permanentModules, ...dynamic];
        return merged.filter((item, index, all) => all.findIndex((candidate) => candidate.id === item.id) === index);
      }

      function placeModules(items) {
        const radius = items.length <= 4 ? 180 : 230;
        const start = -90;
        return items.map((item, index) => {
          const angle = ((start + (360 / items.length) * index) * Math.PI) / 180;
          return {
            ...item,
            x: Math.round(Math.cos(angle) * radius),
            y: Math.round(Math.sin(angle) * radius),
            delay: index * 22
          };
        });
      }

      async function refresh() {
        try {
          state.dashboard = await window.nexa.api("/dashboard");
          state.voiceStatus = await window.nexa.api("/voice/status");
          state.focusStatus = await window.nexa.api("/evolution/focus/status");
          if (state.panel === "coding") {
            state.coding = await window.nexa.api("/coding/report");
            state.weekly = await window.nexa.api("/coding/weekly-report");
          }
          if (state.panel === "battery" || state.panel === "settings") {
            state.batterySettings = await window.nexa.api("/battery-alert/settings");
            state.powerSettings = await window.nexa.api("/power-monitor/settings");
            state.powerHistory = await window.nexa.api("/power-monitor/history?limit=5");
          }
          if (state.panel === "study") {
            state.studyDashboard = await window.nexa.api("/evolution/study/dashboard");
          }
          if (state.panel === "timeline") {
            state.timelineDashboard = await window.nexa.api("/evolution/timeline/dashboard?view=today");
          }
          if (state.panel === "guardian") {
            state.guardianDashboard = await window.nexa.api("/evolution/project-guardian/dashboard?project_path=" + encodeURIComponent("C:\\Programs\\codex\\NEXA"));
          }
          state.error = "";
        } catch (error) {
          state.error = String(error.message || error);
        }
        render();
      }

      async function refreshVoiceStatus() {
        try {
          state.voiceStatus = await window.nexa.api("/voice/status");
          if (state.view === "bubble" || state.view === "radial") render();
        } catch {
          // Voice status is optional while the backend is starting.
        }
      }

      function speak(text) {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
      }

      async function sendCommand() {
        const input = document.getElementById("command");
        const command = input.value.trim();
        if (!command) return;
        state.chat.push({ who: "User", text: command });
        input.value = "";
        state.loading = true;
        render();
        try {
          const result = await window.nexa.command(command);
          state.chat.push({ who: "Nexa", text: `${result.status || "completed"}: ${result.agent || "task"} / ${result.intent || "command"}` });
          speak(`Task ${result.status || "completed"}`);
          await refresh();
        } catch (error) {
          state.chat.push({ who: "Nexa", text: String(error.message || error) });
        } finally {
          state.loading = false;
          render();
        }
      }

      async function createQuickAutomation() {
        const name = document.getElementById("automation-name")?.value.trim() || "Nexa quick automation";
        const metric = document.getElementById("automation-metric")?.value || "battery";
        const value = Number(document.getElementById("automation-value")?.value || 20);
        await window.nexa.api("/automations", {
          method: "POST",
          body: {
            name,
            condition: { metric, operator: metric === "battery" ? "<=" : ">", value },
            action: { type: "notify", message: `${metric} condition reached` }
          }
        });
        state.chat.push({ who: "Nexa", text: `Automation created: ${name}` });
        await refresh();
      }

      function startVoiceCommand() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          state.chat.push({ who: "Nexa", text: "Voice command capture is ready for supported Chromium speech engines." });
          render();
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.onresult = (event) => {
          const transcript = event.results?.[0]?.[0]?.transcript || "";
          const input = document.getElementById("command");
          if (input) input.value = transcript;
        };
        recognition.onerror = () => {
          state.chat.push({ who: "Nexa", text: "Voice capture failed. Text command mode remains active." });
          render();
        };
        recognition.start();
      }

      async function updateBatterySettings(patch) {
        state.batterySettings = await window.nexa.api("/battery-alert/settings", { method: "PUT", body: patch });
        render();
      }

      async function updatePowerSettings(patch) {
        state.powerSettings = await window.nexa.api("/power-monitor/settings", { method: "PUT", body: patch });
        render();
      }

      async function toggleAutomation(id, enabled) {
        await window.nexa.api(`/automations/${id}/toggle`, { method: "PUT", body: { enabled } });
        await refresh();
      }

      async function startFocusQuick() {
        await window.nexa.api("/evolution/focus/start", {
          method: "POST",
          body: { title: "Orbital Focus Session", session_type: "focus", duration_minutes: 25, current_goal: "Stay focused" }
        });
        await refresh();
      }

      async function focusAction(action, body = {}) {
        await window.nexa.api(`/evolution/focus/${action}`, { method: "POST", body });
        await refresh();
      }

      async function taskAction(id, action) {
        await window.nexa.api(`/tasks/${id}/${action}`, { method: "POST" });
        await refresh();
      }

      function renderShell(title, subtitle, body) {
        return `
          <div class="panel">
            <div class="panel-head drag">
              <div class="panel-title"><strong>${title}</strong><span>${subtitle}</span></div>
              <div class="head-actions">
                <button class="icon-button" id="to-radial" title="Radial menu">R</button>
                <button class="icon-button" id="to-bubble" title="Minimize">-</button>
              </div>
            </div>
            <div class="panel-body">${state.error ? `<div class="card small">${state.error}</div>` : ""}${body}</div>
          </div>`;
      }

      function card(label, value) {
        return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div></div>`;
      }

      function renderBattery() {
        const system = state.dashboard?.system || {};
        const alert = state.dashboard?.battery_alert || {};
        const power = state.dashboard?.power_monitor || {};
        const settings = state.batterySettings || {};
        const powerSettings = state.powerSettings || {};
        const events = state.powerHistory?.events || [];
        const sessions = state.powerHistory?.charge_sessions || [];
        const batteryPercent = power.battery_percent ?? alert.battery_percent ?? system.battery_percent;
        return renderShell("Battery Health", "Power status, charging, history, and health", `
          ${alert.alert_active ? `<div class="warning"><strong>Low Battery Warning</strong><br>Only ${alert.battery_percent}% battery remaining. Please connect your charger.</div>` : ""}
          <div class="grid cols-3">
            ${card("Battery %", fmt(batteryPercent, "%"))}
            ${card("Battery Health", power.battery_health_percent == null ? batteryHealth(batteryPercent) : `${power.battery_health_percent}%`)}
            ${card("Wear", power.battery_wear_percent == null ? "Unknown" : `${power.battery_wear_percent}%`)}
            ${card("Charging", power.is_charging ?? alert.is_charging ?? system.battery_plugged ? "Yes" : "No")}
            ${card("Power Source", power.power_source || (system.battery_plugged ? "AC Power" : "Battery"))}
            ${card("Time Remaining", secs(power.estimated_remaining_seconds ?? system.battery_secs_left))}

      function bindManualDrag(element, onTap, onDoubleTap) {
        let dragging = false;
        let moved = false;
        let lastX = 0;
        let lastY = 0;
        let lastTap = 0;
        let tapTimer = null;
        element.addEventListener("mousedown", (event) => {
          if (event.button !== 0) return;
          dragging = true;
          moved = false;
          lastX = event.screenX;
          lastY = event.screenY;
          event.preventDefault();
        });
        window.addEventListener("mousemove", (event) => {
          if (!dragging) return;
          const deltaX = event.screenX - lastX;
          const deltaY = event.screenY - lastY;
          if (Math.abs(deltaX) + Math.abs(deltaY) > 0) {
            moved = true;
            element.dataset.dragMoved = "true";
            window.nexa.moveBy(deltaX, deltaY);
            lastX = event.screenX;
            lastY = event.screenY;
          }
        });
        window.addEventListener("mouseup", () => {
          if (!dragging) return;
          dragging = false;
          if (moved) {
            setTimeout(() => {
              moved = false;
              element.dataset.dragMoved = "false";
            }, 80);
          } else if (onTap) {
            const now = Date.now();
            if (onDoubleTap && now - lastTap < 320) {
              clearTimeout(tapTimer);
              tapTimer = null;
              lastTap = 0;
              onDoubleTap();
            } else {
              lastTap = now;
              tapTimer = setTimeout(() => {
                tapTimer = null;
                onTap();
              }, onDoubleTap ? 220 : 0);
            }
          }
        });
      }

          const input = document.getElementById("command");
          if (input) input.value = button.dataset.suggestion;
        }));
        document.body.oncontextmenu = (event) => {
          event.preventDefault();
          window.nexa.contextMenu();
        };
      }

      function render() {
        if (state.view === "bubble") renderBubble();
        else if (state.view === "radial") renderRadial();
        else renderPanel();
      }

      setInterval(() => {
        if (state.view !== "bubble") refresh();
        else refreshVoiceStatus();
      }, 30000);

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") setView("bubble");
        if (event.key === "Enter" && state.view === "bubble") setView("radial");
      });

      render();
      resize("bubble");
    </script>
  </body>
</html>
